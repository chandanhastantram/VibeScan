name: VibeScan Security Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install VibeScan
      run: |
        python -m pip install --upgrade pip
        pip install chandan-vibescan

    - name: Run VibeScan Security Scan
      # Scans the entire repository and will fail the build if it finds HIGH or CRITICAL issues
      run: |
        vibescan scan . --severity HIGH
